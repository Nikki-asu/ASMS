<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ASMS — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1b2a;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      color: #ffffff;
      font-size: 2.2rem;
      margin-bottom: 0.25rem;
      text-align: center;
    }

    .subtitle {
      color: #a0b4c8;
      font-size: 0.85rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .card {
      background: #ffffff;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }

    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1a3a5c; }

    .error {
      background: #fff5f5;
      border: 1px solid #fc8181;
      color: #c53030;
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
      font-size: 0.85rem;
      margin-top: 1rem;
    }

    button {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.7rem;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #25527d; }

    .demo-hint {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.8rem;
      color: #718096;
    }

    .demo-hint strong { color: #1a3a5c; }

    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
  </style>
</head>
<body>

  <h1>Automotive Shop Management System</h1>
  <p class="subtitle">Sign in to continue</p>

  <div class="card">
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter username" required autofocus />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required />

      <button type="submit">Sign In</button>
    </form>

    <p class="demo-hint">
      Want to explore? Use <strong>demo</strong> / <strong>demo123</strong> for read-only access.
    </p>
  </div>

</body>
</html>
